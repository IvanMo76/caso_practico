

{%extends 'login/base_login.html'%}
{%block login%}
<div class="card login-card">

    <div class="login-header">
        <div class="user-icon">
            <i class="bi bi-person-circle"></i>
        </div>
        <h3 class="fw-bold">Inicio de Sesión</h3>
        <p class="text-muted mb-0">
            Ingrese sus credenciales para continuar
        </p>
    </div>

    <div class="login-body">

        <form method="POST" action="/login_session" class="needs-validation" novalidate>

            <!-- Usuario -->
            <div class="mb-3">
                <label class="form-label">
                    Usuario
                </label>

                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-envelope-fill"></i>
                    </span>

                    <input
                        type="email"
                        class="form-control"
                        id="username"
                        name="username"
                        placeholder="correo@ejemplo.com"
                        required>

                    <div class="invalid-feedback">
                        Ingrese un correo válido.
                    </div>
                </div>
            </div>

            <!-- Contraseña -->
            <div class="mb-4">
                <label class="form-label">
                    Contraseña
                </label>

                <div class="input-group">

                    <span class="input-group-text">
                        <i class="bi bi-lock-fill"></i>
                    </span>

                    <input
                        type="password"
                        class="form-control"
                        id="password"
                        name="password"
                        placeholder="Ingrese su contraseña"
                        minlength="6"
                        required>

                    <span
                        class="input-group-text password-toggle"
                        onclick="togglePassword()">

                        <i id="eyeIcon" class="bi bi-eye"></i>

                    </span>

                    <div class="invalid-feedback">
                        La contraseña debe contener al menos 6 caracteres.
                    </div>

                </div>
            </div>

            <button type="submit" class="btn btn-login">
                <i class="bi bi-box-arrow-in-right"></i>
                Iniciar Sesión
            </button>

        </form>
        <div class="text-center mt-4">
    <small class="text-muted">
        <i class="bi bi-arrow-left-circle"></i>
        ¿No cuentas con credenciales?
        <a href="{{url_for('home')}}" class="text-decoration-none fw-semibold">
            Regresar
        </a>
    </small>
</div>
    </div>

</div>
{%endblock%}
